services:
  mysql:
    image: mysql:8.4
    container_name: commerce-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required (see .env.example)}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-commerce}
      MYSQL_USER: ${MYSQL_USER:-commerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required (see .env.example)}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - commerce-mysqldata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -u
        - $$MYSQL_USER
        - -p$$MYSQL_PASSWORD
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  commerce-mysqldata:
